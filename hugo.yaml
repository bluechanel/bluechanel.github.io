baseURL: https://www.wileyzhang.com/
languageCode: zh-cn
title: Wiley Blog | AI/LLM developer blog
theme: "Gallery"

hasCJKLanguage: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Wiley Blog | AI/LLM developer blog
  author: Wiley Zhang
  description: "A technical blog focusing on AI, LLM development, and cutting-edge technology insights. Sharing practical experiences and in-depth analysis in artificial intelligence and large language models."
  keywords: ['AI', 'LLM', 'Machine Learning', 'Artificial Intelligence', 'Developer Blog', 'Technical Writing', 'Programming']
  images: ["cover.png"]  # 此处配置 og x 平台分享图片
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false
  
  ShowBreadCrumbs: true
  ShowRssButtonInSectionTermList: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  hideFooter: true
  comment: true
  
  giscus:
    repo: "bluechanel/bluechanel.github.io"
    repo_id: "R_kgDOPJbDvQ"
    category: "Announcements"
    category_id: "DIC_kwDOPJbDvc4CtPDS"
    mapping: "pathname"
    strict: "0"
    reactions_enabled: "1"
    emit_metadata: "0"
    input_position: "top"
    theme: "preferred_color_scheme"
    lang: "zh-CN"
    loading: "lazy"


  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "/favicon.png"
    favicon16x16: "/favicon.png"
    favicon32x32: "/favicon.png"
    apple_touch_icon: "/favicon.png"
    safari_pinned_tab: "/favicon.png"

  label:
    text: "Home"
    icon: /apple-touch-icon.png
    iconHeight: 35

  analytics:
    google:
      SiteVerificationTag: "G-9QC19VEKH0"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
  
  sortField: updateDate       # 按哪个字段排序，可以是 updateDate 或 date 等
  sortOrder: desc             # asc 或 desc
  mainSections: ["posts"]     # 指定文章内容文件夹

pygmentsUseClasses: true
markup:
  tableOfContents:
    startLevel: 1
    endLevel: 3
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    # lineNos: true
    style: monokai

caches:
  images:
    dir: :cacheDir/images
