{{ define "main" }}
  {{ $films := site.Data.films }}
  <div class="flex items-center gap-3 bg-gray-100 dark:bg-gray-800 max-w-md">
    <!-- 图标 -->
    <div class="flex items-center justify-center w-8 h-8 bg-white dark:bg-gray-700 rounded-full border border-gray-300 dark:border-gray-600">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lightbulb-icon lucide-lightbulb"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
    </div>

    <!-- 文本信息 -->
    <p class="text-sm text-gray-800 dark:text-gray-200">
      已观看 <span class="font-semibold text-blue-600 dark:text-blue-400">{{ site.Params.films }}</span> 部电影 

      <a href="https://movie.douban.com/people/155507928/collect" target="_blank" class="ml-1 text-blue-500 hover:underline">(@ 豆瓣)</a>
    </p>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6 py-2">
    {{ range $films.read }}
    <div class="p-5 bg-gradient-to-br from-white to-gray-50 dark:from-gray-800 dark:to-gray-900 rounded-2xl shadow-md hover:shadow-xl transition duration-300 transform hover:-translate-y-1">
      
      <!-- 标题 -->
      <a href="{{ .describe }}" target="_blank" rel="noopener noreferrer">
        <h2 class="text-lg font-bold hover:underline mb-3 truncate">{{ .name }}</h2>
      </a>

      <!-- 开始日期 -->
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-3">
        📅 <span class="font-medium">开始日期：</span>{{ .date | time.Format "2006-01-02" }}
      </p>

      <!-- 标签 -->
      {{ if .tags }}
        <div class="flex flex-wrap gap-2">
          {{ range .tags }}
            <span class="inline-block text-xs font-medium px-2 py-0.5 rounded-full bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200">
              #{{ . }}
            </span>
          {{ end }}
        </div>
      {{ end }}

    </div>
    {{ end }}
  </div>
{{ end }}
